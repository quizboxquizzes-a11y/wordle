<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordle Premium Desktop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-viewport">
        
        <header class="app-header">
            <div class="header-side-pack">
                <button class="nav-icon-btn" id="stats-trigger" title="Statistics">
                    <svg viewBox="0 0 24 24"><path d="M16,11H18V18H16V11M11,5H13V18H11V5M6,14H8V18H6V14Z"/></svg>
                </button>
            </div>
            <h1 class="main-logo">WORDLE</h1>
            <div class="header-side-pack">
                <button class="nav-icon-btn" id="settings-trigger" title="Settings">
                    <svg viewBox="0 0 24 24"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.47,5.34 14.86,5.08L14.47,2.42C14.43,2.18 14.22,2 14,2H10C9.78,2 9.57,2.18 9.53,2.42L9.14,5.08C8.53,5.34 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.95C7.96,18.34 8.53,18.66 9.14,18.92L9.14,21.58C9.57,21.82 9.78,22 10,22H14C14.22,22 14.43,21.82 14.47,21.58L14.86,18.92C15.47,18.66 16.04,18.34 16.56,17.95L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
                </button>
            </div>
        </header>

        <div id="toast-manager"></div>

        <main id="game-workspace">
            <div id="board-matrix"></div>
        </main>

        <footer id="keyboard-wrapper">
            <div id="virtual-keyboard"></div>
        </footer>
    </div>

    <div class="modal-dimmer" id="settings-overlay">
        <div class="modal-card">
            <button class="dismiss-modal-btn" id="hide-settings">✕</button>
            <h2 class="modal-title">SETTINGS</h2>
            <div class="setting-row">
                <span class="setting-label">Light UI Interface</span>
                <label class="switch-control">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider-round"></span>
                </label>
            </div>
            <div class="setting-row">
                <div>
                    <span class="setting-label">High Contrast Access</span>
                    <p class="setting-desc">Applies color-blind accessible feedback tokens</p>
                </div>
                <label class="switch-control">
                    <input type="checkbox" id="contrast-toggle">
                    <span class="slider-round"></span>
                </label>
            </div>
        </div>
    </div>

    <div class="modal-dimmer" id="stats-overlay">
        <div class="modal-card text-center">
            <button class="dismiss-modal-btn" id="hide-stats">✕</button>
            <h2 class="modal-title">STATISTICS</h2>
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-num" id="val-played">0</span><span class="stat-txt">Played</span></div>
                <div class="stat-box"><span class="stat-num" id="val-pct">0</span><span class="stat-txt">Win %</span></div>
                <div class="stat-box"><span class="stat-num" id="val-streak">0</span><span class="stat-txt">Current Streak</span></div>
                <div class="stat-box"><span class="stat-num" id="val-max">0</span><span class="stat-txt">Max Streak</span></div>
            </div>
            <button id="action-play-again" class="primary-action-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script src="words.js"></script>
    <script src="app.js"></script>
</body>
</html>
